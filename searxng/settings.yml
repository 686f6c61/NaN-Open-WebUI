# SearXNG para la busqueda web de Open WebUI.
# Activa el formato JSON que Open WebUI consulta y desactiva el limitador.
# La imagen oficial sobrescribe 'ultrasecretkey' con SEARXNG_SECRET.
# No pongas aqui un secreto real: debe vivir solo en .env.

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  limiter: false
  image_proxy: true

ui:
  static_use_hash: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "all"
  formats:
    - html
    - json
